name: backdoor-toolbox
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # Deep Learning Frameworks
  - pytorch::pytorch>=2.0.0
  - pytorch::torchvision>=0.15.0
  - pytorch::torchaudio>=2.0.0
  - pytorch::pytorch-cuda=11.8

  # Data Science & Numerical Computing
  - numpy>=1.24.0
  - scipy>=1.10.0
  - pandas>=2.0.0
  - scikit-learn>=1.2.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - plotly>=5.14.0

  # Image Processing
  - pillow>=9.5.0
  - opencv>=4.7.0

  # Progress & Logging
  - tqdm>=4.65.0

  # Jupyter & Interactive Development
  - jupyter>=1.0.0
  - ipython>=8.12.0
  - notebook>=6.5.0

  # Configuration & Utilities
  - pyyaml>=6.0
  - h5py>=3.8.0

  # Testing
  - pytest>=7.3.0

  - pip>=23.0

  - pip:
    # Additional ML/DL libraries
    - tensorboard>=2.12.0
    - tensorboardX>=2.6
    
    # Advanced visualization
    - wandb>=0.15.0
    
    # Image augmentation
    - albumentations>=1.3.0
    - imgaug>=0.4.0
    
    # Model utilities
    - timm>=0.9.0
    - torchsummary>=1.5.1
    - thop>=0.1.1
    
    # Data handling
    - openpyxl>=3.1.0
    - tabulate>=0.9.0
    
    # Backdoor-specific libraries
    - trojai>=0.2.0
    
    # Additional utilities
    - python-dotenv>=1.0.0
    - colorama>=0.4.6
